<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>My Journal</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0e0c;
  --surface:#1a1916;
  --card:#201e1b;
  --border:#2e2b26;
  --text:#f0ece4;
  --muted:#7a7568;
  --gold:#c9a84c;
  --gold-dim:#7a6530;
  --red:#c0392b;
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
#auth{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.auth-box{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:44px 36px;width:100%;max-width:380px}
.auth-box h1{font-family:'Playfair Display',serif;font-size:2rem;color:var(--gold);margin-bottom:4px}
.auth-box .sub{color:var(--muted);font-size:.85rem;margin-bottom:32px}
.lbl{display:block;font-size:.72rem;font-weight:500;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin-bottom:6px}
input[type=email],input[type=password],textarea{width:100%;background:#141310;border:1px solid var(--border);border-radius:8px;padding:11px 14px;font-family:'Inter',sans-serif;font-size:.9rem;color:var(--text);outline:none;transition:border-color .15s}
input[type=email]:focus,input[type=password]:focus,textarea:focus{border-color:var(--gold-dim)}
.field{margin-bottom:14px}
.btn{width:100%;background:var(--gold);color:#0f0e0c;border:none;border-radius:8px;padding:12px;font-family:'Inter',sans-serif;font-size:.9rem;font-weight:500;cursor:pointer;transition:opacity .15s;margin-top:6px}
.btn:hover{opacity:.85}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-ghost{background:none;border:1px solid var(--border);color:var(--muted);border-radius:8px;padding:7px 14px;font-family:'Inter',sans-serif;font-size:.8rem;cursor:pointer;transition:all .15s}
.btn-ghost:hover{border-color:var(--gold);color:var(--gold)}
.toggle{text-align:center;margin-top:18px;font-size:.83rem;color:var(--muted)}
.toggle a{color:var(--gold);cursor:pointer;text-decoration:none}
.notice{border-radius:8px;padding:10px 13px;font-size:.82rem;margin-bottom:14px;display:none}
.notice.err{background:#2a1210;border:1px solid #5a2020;color:#e88;display:block}
.notice.ok{background:#12201a;border:1px solid #1e5a34;color:#6e8;display:block}
#app{display:none;min-height:100vh}
nav{background:var(--surface);border-bottom:1px solid var(--border);padding:0 28px;height:58px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.nav-logo{font-family:'Playfair Display',serif;font-size:1.25rem;color:var(--gold)}
.nav-right{display:flex;align-items:center;gap:12px}
.nav-email{font-size:.75rem;color:var(--muted)}
main{max-width:680px;margin:0 auto;padding:36px 20px}
.write-box{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:22px;margin-bottom:32px}
.write-date{font-size:.75rem;color:var(--gold);font-weight:500;text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px}
.write-box textarea{min-height:120px;resize:vertical;border-radius:8px;font-size:.95rem;line-height:1.7;background:#141310}
.write-box textarea::placeholder{color:#3a3830;font-style:italic}
.write-footer{display:flex;justify-content:space-between;align-items:center;margin-top:12px}
.write-footer span{font-size:.75rem;color:var(--muted)}
.save-btn{background:var(--gold);color:#0f0e0c;border:none;border-radius:8px;padding:8px 22px;font-family:'Inter',sans-serif;font-size:.85rem;font-weight:500;cursor:pointer;transition:opacity .15s}
.save-btn:hover{opacity:.85}
.save-btn:disabled{opacity:.4;cursor:not-allowed}
.entries-label{font-size:.72rem;font-weight:500;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:16px}
.entry{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px 22px;margin-bottom:14px;position:relative;animation:up .25s ease both}
@keyframes up{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.entry-date{font-size:.72rem;color:var(--gold);font-weight:500;text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px}
.entry-text{font-family:'Playfair Display',serif;font-style:italic;font-size:1rem;line-height:1.75;color:#cec8be;white-space:pre-wrap;word-break:break-word}
.entry-del{position:absolute;top:14px;right:14px;background:none;border:none;color:#3a3830;font-size:.85rem;cursor:pointer;transition:color .15s;display:none}
.entry:hover .entry-del{display:block}
.entry-del:hover{color:var(--red)}
.empty{text-align:center;padding:60px 0;color:var(--muted)}
.empty .icon{font-size:2rem;margin-bottom:10px}
.empty p{font-size:.88rem;font-style:italic}
.loading{text-align:center;padding:40px;color:var(--muted);font-size:.88rem}
</style>
</head>
<body>

<div id="auth">
  <div class="auth-box">
    <h1>Dear Diary</h1>
    <p class="sub">Your private journal, always safe.</p>
    <div id="msg" class="notice"></div>
    <div class="field"><label class="lbl">Email</label><input type="email" id="email" placeholder="you@example.com"/></div>
    <div class="field"><label class="lbl">Password</label><input type="password" id="pass" placeholder="••••••••"/></div>
    <button class="btn" id="auth-btn">Log in</button>
    <p class="toggle"><span id="toggle-text">No account?</span> <a id="toggle-link">Sign up</a></p>
  </div>
</div>

<div id="app">
  <nav>
    <div class="nav-logo">Dear Diary</div>
    <div class="nav-right">
      <span class="nav-email" id="nav-email"></span>
      <button class="btn-ghost" id="logout">Sign out</button>
    </div>
  </nav>
  <main>
    <div class="write-box">
      <div class="write-date" id="today-date"></div>
      <textarea id="entry-text" placeholder="What's on your mind today…" maxlength="2000"></textarea>
      <div class="write-footer">
        <span><span id="chars">0</span> / 2000</span>
        <button class="save-btn" id="save-btn" disabled>Save entry</button>
      </div>
    </div>
    <div class="entries-label">Past entries</div>
    <div id="entries"><div class="loading">Loading…</div></div>
  </main>
</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const URL = 'https://jpchqxurryltwdwrdqki.supabase.co'
const KEY = 'sb_publishable_E79rm_FxuCQvzswtm7kx8g_xtAPk_fm'

const sb = createClient(URL, KEY)
const $ = id => document.getElementById(id)
let signup = false

$('today-date').textContent = new Date().toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'long',year:'numeric'})

sb.auth.onAuthStateChange((_,session)=>{
  if(session){
    $('auth').style.display='none'
    $('app').style.display='block'
    $('nav-email').textContent=session.user.email
    load()
  } else {
    $('auth').style.display='flex'
    $('app').style.display='none'
  }
})

$('toggle-link').onclick=()=>{
  signup=!signup
  $('auth-btn').textContent=signup?'Create account':'Log in'
  $('toggle-link').textContent=signup?'Log in':'Sign up'
  $('toggle-text').textContent=signup?'Have an account?':'No account?'
  $('msg').className='notice'
}

$('auth-btn').onclick=async()=>{
  const e=$('email').value.trim(), p=$('pass').value
  if(!e||!p){return show('Fill in both fields','err')}
  $('auth-btn').disabled=true
  $('auth-btn').textContent=signup?'Creating…':'Logging in…'
  const{error}=signup
    ?await sb.auth.signUp({email:e,password:p})
    :await sb.auth.signInWithPassword({email:e,password:p})
  $('auth-btn').disabled=false
  $('auth-btn').textContent=signup?'Create account':'Log in'
  if(error)return show(error.message,'err')
  if(signup)show('Account created! You can now log in.','ok')
}

$('logout').onclick=()=>sb.auth.signOut()

$('entry-text').oninput=()=>{
  const l=$('entry-text').value.length
  $('chars').textContent=l
  $('save-btn').disabled=l===0
}

$('save-btn').onclick=async()=>{
  const content=$('entry-text').value.trim()
  if(!content)return
  $('save-btn').disabled=true
  $('save-btn').textContent='Saving…'
  const{data:{user}}=await sb.auth.getUser()
  const{error}=await sb.from('entries').insert({content,user_id:user.id})
  $('save-btn').disabled=false
  $('save-btn').textContent='Save entry'
  if(error)return alert(error.message)
  $('entry-text').value=''
  $('chars').textContent='0'
  load()
}

async function load(){
  $('entries').innerHTML='<div class="loading">Loading…</div>'
  const{data,error}=await sb.from('entries').select('*').order('created_at',{ascending:false})
  if(error){$('entries').innerHTML=`<p style="color:red">${error.message}</p>`;return}
  if(!data.length){
    $('entries').innerHTML=`<div class="empty"><div class="icon">🕯️</div><p>No entries yet. Write your first one above.</p></div>`
    return
  }
  $('entries').innerHTML=data.map(e=>{
    const d=new Date(e.created_at).toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'long',year:'numeric'})
    const safe=e.content.replace(/</g,'&lt;').replace(/>/g,'&gt;')
    return`<div class="entry">
      <button class="entry-del" onclick="del('${e.id}')">✕</button>
      <div class="entry-date">${d}</div>
      <div class="entry-text">${safe}</div>
    </div>`
  }).join('')
}

window.del=async id=>{
  if(!confirm('Delete this entry?'))return
  await sb.from('entries').delete().eq('id',id)
  load()
}

function show(msg,type){$('msg').textContent=msg;$('msg').className=`notice ${type}`}
</script>
</body>
</html>
